<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مول الحانوت — متعقب الديون</title>
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D1B3E',
                        secondary: '#00C9B1',
                        tertiary: '#E63946',
                        neutral: '#1A1A2E',
                        bgLight: '#F8F9FE'
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-bgLight font-cairo">
    <!-- Intro Screen -->
    <div id="intro-screen">
        <div class="logo-anim mb-4">
            <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
        <h1 class="text-white text-2xl font-black">مول الحانوت</h1>
        <p class="text-secondary text-sm mt-2">جاري تحميل البيانات...</p>
        <div class="w-32 h-1 bg-white/10 rounded-full mt-6 overflow-hidden">
            <div class="h-full bg-secondary w-1/2 animate-[loading_1.5s_infinite_ease-in-out]"></div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="min-h-screen max-w-md mx-auto bg-bgLight relative overflow-hidden flex flex-col">
        <!-- Dashboard or Detail View will be injected here -->
    </div>

    <!-- Sidebar / Menu -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
    <div id="sidebar" class="fixed top-0 right-0 bottom-0 w-72 bg-white z-50 shadow-2xl sidebar-transition translate-x-full">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h2 class="text-xl font-black text-primary">مول الحانوت</h2>
            </div>
            
            <nav class="space-y-2">
                <button onclick="navigateTo('dashboard'); toggleSidebar()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-gray-50 text-primary font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>الرئيسية</span>
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-4 p-4 rounded-2xl text-gray-400 hover:bg-gray-50 hover:text-primary transition-all font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span>الإعدادات</span>
                </button>
            </nav>
            
            <div class="absolute bottom-10 left-8 right-8">
                <div class="p-4 bg-indigo-50 rounded-2xl">
                    <p class="text-[10px] text-indigo-400 font-bold mb-1 uppercase tracking-wider">نسخة التطبيق</p>
                    <p class="text-sm font-black text-indigo-600">2.0.0 (Offline)</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-overlay hidden">
        <!-- Modal content injected here -->
    </div>

    <!-- Hidden File Input for Import -->
    <input type="file" id="import-file" class="hidden" accept=".json" onchange="handleImport(event)">

    <!-- Scripts -->
    <script type="module" src="/src/js/app.js"></script>
</body>
</html>
